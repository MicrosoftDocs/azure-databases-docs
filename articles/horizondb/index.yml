### YamlMime:Landing
metadata:
  title: Microsoft Azure HorizonDB Documentation Landing Page
  description: Azure HorizonDB is a fully managed relational database service on Microsoft Azure, combining the open-source PostgreSQL engine with built-in AI, high performance, and enterprise-grade security.
  author: denzilribeiro
  ms.author: denzilr
  ms.reviewer: maghan
  ms.date: 06/02/2026
  ms.service: azure-database-postgresql
  ms.topic: landing-page

title: Microsoft Azure HorizonDB documentation
summary: Azure HorizonDB is a fully managed, AI-ready Database-as-a-Service (DBaaS) offering built on the open-source PostgreSQL engine, designed to support mission-critical workloads with predictable performance, robust security, high availability, and seamless scalability. It empowers developers to build intelligent, AI-powered applications through native support for vector embeddings and integration with Foundry Tools.

